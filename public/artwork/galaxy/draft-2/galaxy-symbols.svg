<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">Draft 2 minimal galaxy symbol sheet</title>
  <desc id="desc">Over-simplified cyan and cream symbols: planet, cloud block, comet block, and diamond stars.</desc>
  <defs>
    <symbol id="star-diamond" viewBox="-50 -50 100 100">
      <rect x="-28" y="-28" width="56" height="56" transform="rotate(45)"/>
    </symbol>
    <symbol id="orbit-planet" viewBox="-140 -110 280 220">
      <clipPath id="planetSymbolClip">
        <circle r="70"/>
      </clipPath>
      <circle r="70" fill="#fff8ea" stroke="#4ab3d4" stroke-width="8"/>
      <g clip-path="url(#planetSymbolClip)">
        <rect x="-70" y="0" width="140" height="70" fill="#4ab3d4"/>
        <rect x="-70" y="-48" width="140" height="28" fill="#4ab3d4" opacity=".36"/>
      </g>
      <rect x="-132" y="-14" width="264" height="28" rx="14" fill="#4ab3d4" opacity=".72" transform="rotate(-14)"/>
      <rect x="-92" y="-8" width="184" height="16" rx="8" fill="#fff8ea" opacity=".95" transform="rotate(-14)"/>
    </symbol>
    <symbol id="cloud-block" viewBox="0 0 320 160">
      <path fill="#fff8ea" stroke="#4ab3d4" stroke-width="8" d="M0 96h58V58h68V20h96v54h98v86H0z"/>
      <path fill="#4ab3d4" opacity=".34" d="M0 96h126V58h96v16h98v86H0z"/>
    </symbol>
    <symbol id="comet-block" viewBox="0 0 320 140">
      <path fill="#fff8ea" stroke="#4ab3d4" stroke-width="8" d="M0 72h196l-48-44h112l60 44-60 44H148l48-44z"/>
      <path fill="#4ab3d4" opacity=".34" d="M0 72h196l-48 44h112l60-44z"/>
    </symbol>
  </defs>

  <rect width="1200" height="420" fill="#ffffff"/>
  <use href="#orbit-planet" x="170" y="190" width="280" height="220"/>
  <use href="#cloud-block" x="390" y="160" width="320" height="160"/>
  <use href="#comet-block" x="758" y="165" width="320" height="140"/>
  <use href="#star-diamond" x="1060" y="102" width="100" height="100" fill="#fff8ea" stroke="#4ab3d4" stroke-width="6"/>
  <use href="#star-diamond" x="1020" y="252" width="70" height="70" fill="#4ab3d4" opacity=".65"/>
</svg>
