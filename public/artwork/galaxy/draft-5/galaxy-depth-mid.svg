<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080" role="img" aria-labelledby="title desc">
  <title id="title">Draft 5 mid planet glyphs with halftone line field</title>
  <desc id="desc">Round cyan and cream planet glyphs embedded in dense halftone dots, repeated curves, dotted paths, and graduated line stacks.</desc>
  <defs>
    <filter id="field-wash" x="-12%" y="-18%" width="124%" height="136%" color-interpolation-filters="sRGB">
      <feTurbulence type="fractalNoise" baseFrequency="0.009 0.017" numOctaves="2" seed="244" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="12"/>
      <feGaussianBlur stdDeviation="12"/>
    </filter>
    <pattern id="halftone" width="38" height="38" patternUnits="userSpaceOnUse">
      <circle cx="7" cy="7" r="3.2" fill="#4ab3d4" opacity=".42"/>
      <circle cx="27" cy="26" r="1.8" fill="#4ab3d4" opacity=".26"/>
    </pattern>
    <pattern id="creamHalftone" width="58" height="58" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="13" r="4.2" fill="#fff8ea" opacity=".72"/>
      <circle cx="42" cy="40" r="2.6" fill="#fff8ea" opacity=".46"/>
    </pattern>
    <clipPath id="hero"><circle cx="960" cy="540" r="220"/></clipPath>
    <clipPath id="left"><circle cx="388" cy="360" r="82"/></clipPath>
    <clipPath id="right"><circle cx="1508" cy="690" r="90"/></clipPath>
    <clipPath id="low"><circle cx="520" cy="810" r="62"/></clipPath>
  </defs>

  <g filter="url(#field-wash)" opacity=".4">
    <rect x="110" y="214" width="700" height="90" fill="#8f3eb5"/>
    <rect x="250" y="352" width="1110" height="84" fill="#2f80c1"/>
    <rect x="704" y="500" width="970" height="90" fill="#ec4e9b"/>
    <rect x="390" y="708" width="940" height="78" fill="#39c7e2"/>
    <rect x="506" y="150" width="78" height="760" fill="#5d52a3"/>
    <rect x="972" y="118" width="70" height="830" fill="#3550a3"/>
    <rect x="1438" y="180" width="90" height="710" fill="#8f3eb5"/>
  </g>

  <rect x="0" y="170" width="1920" height="760" fill="url(#halftone)" opacity=".72"/>
  <rect x="128" y="260" width="1650" height="540" fill="url(#creamHalftone)" opacity=".28"/>

  <g fill="none" stroke="#4ab3d4" stroke-linecap="round">
    <path d="M-80 244C214 148 408 158 628 274s422 124 676-18 468-120 704 42" stroke-width="11" opacity=".5"/>
    <path d="M-80 292C214 196 408 206 628 322s422 124 676-18 468-120 704 42" stroke-width="8" opacity=".42"/>
    <path d="M-80 340C214 244 408 254 628 370s422 124 676-18 468-120 704 42" stroke-width="5" opacity=".36"/>
    <path d="M-80 388C214 292 408 302 628 418s422 124 676-18 468-120 704 42" stroke-width="3" opacity=".3" stroke-dasharray="1 20"/>

    <path d="M-60 650C222 558 404 566 604 672s386 112 620-18 436-126 766 36" stroke-width="9" opacity=".42" stroke-dasharray="1 24"/>
    <path d="M-60 704C222 612 404 620 604 726s386 112 620-18 436-126 766 36" stroke-width="6" opacity=".36" stroke-dasharray="1 26"/>
    <path d="M-60 758C222 666 404 674 604 780s386 112 620-18 436-126 766 36" stroke-width="3" opacity=".3" stroke-dasharray="1 28"/>
  </g>

  <g opacity=".92">
    <circle cx="960" cy="540" r="220" fill="#fff8ea"/>
    <g clip-path="url(#hero)">
      <rect x="740" y="540" width="440" height="220" fill="#4ab3d4"/>
      <rect x="740" y="418" width="440" height="48" fill="#4ab3d4" opacity=".36"/>
      <rect x="938" y="320" width="44" height="440" fill="#4ab3d4" opacity=".18"/>
      <rect x="740" y="320" width="440" height="440" fill="url(#halftone)" opacity=".24"/>
    </g>
    <rect x="598" y="514" width="724" height="50" fill="#4ab3d4" opacity=".76" transform="rotate(-10 960 540)"/>
    <rect x="690" y="528" width="540" height="20" fill="#fff8ea" opacity=".96" transform="rotate(-10 960 540)"/>
  </g>

  <g opacity=".88">
    <circle cx="388" cy="360" r="82" fill="#fff8ea"/>
    <g clip-path="url(#left)">
      <rect x="306" y="360" width="164" height="82" fill="#4ab3d4"/>
      <rect x="306" y="278" width="164" height="164" fill="url(#halftone)" opacity=".28"/>
    </g>
    <rect x="266" y="349" width="244" height="22" fill="#4ab3d4" opacity=".72" transform="rotate(8 388 360)"/>
    <rect x="318" y="354" width="140" height="10" fill="#fff8ea" opacity=".96" transform="rotate(8 388 360)"/>
  </g>

  <g opacity=".88">
    <circle cx="1508" cy="690" r="90" fill="#fff8ea"/>
    <g clip-path="url(#right)">
      <rect x="1418" y="690" width="180" height="90" fill="#4ab3d4"/>
      <rect x="1418" y="600" width="180" height="180" fill="url(#halftone)" opacity=".24"/>
    </g>
    <rect x="1384" y="680" width="248" height="22" fill="#4ab3d4" opacity=".72" transform="rotate(-6 1508 690)"/>
    <rect x="1436" y="685" width="144" height="10" fill="#fff8ea" opacity=".96" transform="rotate(-6 1508 690)"/>
  </g>

  <g opacity=".82">
    <circle cx="520" cy="810" r="62" fill="#fff8ea"/>
    <g clip-path="url(#low)">
      <rect x="458" y="810" width="124" height="62" fill="#4ab3d4"/>
    </g>
    <rect x="420" y="802" width="200" height="18" fill="#4ab3d4" opacity=".7" transform="rotate(-12 520 810)"/>
  </g>

  <g fill="#fff8ea" stroke="#4ab3d4" stroke-width="5" opacity=".88">
    <polygon points="1268,254 1300,310 1236,310"/>
    <polygon points="1712,490 1750,556 1674,556"/>
    <polygon points="706,872 734,920 678,920"/>
  </g>
</svg>
