<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Galaxy Depth Artwork Draft 3 Preview</title>
    <style>
      body {
        margin: 0;
        font: 15px/1.5 system-ui, -apple-system, "Segoe UI", sans-serif;
        color: #2f3e4a;
        background: #f7fbfd;
      }
      main {
        max-width: 1180px;
        margin: 0 auto;
        padding: 28px;
      }
      h1 {
        margin: 0 0 8px;
        color: #4ab3d4;
        font-size: 28px;
      }
      p {
        margin: 0 0 24px;
      }
      .stage {
        position: relative;
        aspect-ratio: 16 / 9;
        overflow: hidden;
        border: 1px solid #d7e9f1;
        background: white;
      }
      .stage img {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      .far { opacity: .88; }
      .mid { opacity: .82; transform: scale(1.015); }
      .near { opacity: .94; transform: scale(1.04); }
      .grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 18px;
        margin-top: 18px;
      }
      figure {
        margin: 0;
        border: 1px solid #d7e9f1;
        background: white;
      }
      figure img {
        display: block;
        width: 100%;
      }
      figcaption {
        padding: 10px 12px;
        border-top: 1px solid #d7e9f1;
        font-size: 13px;
      }
      @media (max-width: 800px) {
        main { padding: 18px; }
        .grid { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Galaxy Depth Artwork Draft 3</h1>
      <p>Ultra-simple space alphabet: circles, bars, rectangles, diamonds, and blocky translucent color slabs.</p>
      <div class="stage" aria-label="Draft 3 composite layer preview">
        <img class="far" src="./galaxy-depth-far.svg" alt="">
        <img class="mid" src="./galaxy-depth-mid.svg" alt="">
        <img class="near" src="./galaxy-depth-near.svg" alt="">
      </div>
      <div class="grid">
        <figure>
          <img src="./galaxy-depth-far.svg" alt="Draft 3 far color slab layer">
          <figcaption>Draft 3 far color slabs</figcaption>
        </figure>
        <figure>
          <img src="./galaxy-depth-mid.svg" alt="Draft 3 mid planet glyph layer">
          <figcaption>Draft 3 mid planet glyphs</figcaption>
        </figure>
        <figure>
          <img src="./galaxy-depth-near.svg" alt="Draft 3 near space alphabet layer">
          <figcaption>Draft 3 near space alphabet</figcaption>
        </figure>
        <figure>
          <img src="./galaxy-symbols.svg" alt="Draft 3 space alphabet symbol sheet">
          <figcaption>Draft 3 symbol sheet</figcaption>
        </figure>
      </div>
    </main>
  </body>
</html>
