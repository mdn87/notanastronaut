<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080" role="img" aria-labelledby="title desc">
  <title id="title">Far galaxy watercolor depth layer</title>
  <desc id="desc">Semi-transparent blurred watercolor clouds in violet, blue, magenta, and teal with tiny star flecks.</desc>
  <defs>
    <filter id="watercolor-far" x="-20%" y="-30%" width="140%" height="160%" color-interpolation-filters="sRGB">
      <feTurbulence type="fractalNoise" baseFrequency="0.008 0.018" numOctaves="4" seed="19" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="42" xChannelSelector="R" yChannelSelector="G"/>
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <radialGradient id="aquaBloom" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#6ee7f7" stop-opacity=".55"/>
      <stop offset=".52" stop-color="#4c9bd8" stop-opacity=".28"/>
      <stop offset="1" stop-color="#4c9bd8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="roseBloom" cx="50%" cy="50%" r="52%">
      <stop offset="0" stop-color="#f05b9b" stop-opacity=".48"/>
      <stop offset=".58" stop-color="#8f3eb5" stop-opacity=".26"/>
      <stop offset="1" stop-color="#8f3eb5" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="violetBloom" cx="50%" cy="50%" r="56%">
      <stop offset="0" stop-color="#bda8d9" stop-opacity=".42"/>
      <stop offset=".48" stop-color="#5d52a3" stop-opacity=".24"/>
      <stop offset="1" stop-color="#2b1b53" stop-opacity="0"/>
    </radialGradient>
  </defs>

