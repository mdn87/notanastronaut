    <path fill="#65379c" opacity=".34" d="M13 198c111-61 238-65 366 14 98 60 187 64 295 13 176-83 365-60 497 71 112 112 231 114 384 63 145-48 267-7 384 97v289c-178 61-347 34-508-79-131-92-267-101-408-18-165 97-313 91-445-20-126-106-263-114-418-43-74 34-156 42-242 24z"/>
    <path fill="#d73f94" opacity=".23" d="M-46 521c154-79 301-84 441-14 105 52 209 40 313-36 149-109 316-117 501-24 128 65 249 56 363-26 136-98 258-97 364 2v274c-122 38-246 30-372-23-138-58-258-38-360 61-133 130-301 147-504 52-164-77-306-67-426 30-92 74-201 86-326 34z"/>
    <path fill="#39c7e2" opacity=".26" d="M393 741c63-120 157-181 284-183 109-2 197-49 264-141 87-120 217-157 390-111 119 32 224-13 314-136 84-114 181-140 291-77v639c-103 52-208 67-316 45-113-22-208 9-286 94-101 109-218 139-351 88-112-43-202-25-270 54-93 108-198 120-316 36z"/>
  </g>

  <g opacity=".62">
    <ellipse cx="397" cy="286" rx="230" ry="132" fill="url(#roseBloom)"/>
    <ellipse cx="961" cy="562" rx="346" ry="188" fill="url(#aquaBloom)"/>
    <ellipse cx="1507" cy="374" rx="310" ry="180" fill="url(#violetBloom)"/>
    <ellipse cx="1296" cy="842" rx="294" ry="132" fill="url(#roseBloom)"/>
