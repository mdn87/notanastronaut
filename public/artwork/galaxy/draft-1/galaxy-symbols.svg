<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">Reusable simple galaxy symbol sheet</title>
  <desc id="desc">Individual two-tone cyan and cream vector motifs for later placement in the 3D scene.</desc>
  <defs>
    <symbol id="na-star" viewBox="-50 -50 100 100">
      <path d="M0-45l13 32 32 13-32 13L0 45l-13-32-32-13 32-13z"/>
    </symbol>
    <symbol id="na-orbit-planet" viewBox="-140 -110 280 220">
      <clipPath id="symbolPlanetClip">
        <circle r="70"/>
      </clipPath>
      <circle r="70" fill="#fff8ea" stroke="#4ab3d4" stroke-width="7"/>
      <g clip-path="url(#symbolPlanetClip)">
        <path fill="#4ab3d4" d="M-82 20c38-27 76-32 113-15 41 18 82 12 124-18v94H-82z"/>
      </g>
      <ellipse rx="129" ry="30" fill="none" stroke="#4ab3d4" stroke-width="13" transform="rotate(-16)"/>
      <ellipse rx="100" ry="20" fill="none" stroke="#fff8ea" stroke-width="9" transform="rotate(-16)"/>
    </symbol>
    <symbol id="na-cloud" viewBox="0 0 320 160">
      <path fill="#fff8ea" stroke="#4ab3d4" stroke-width="8" d="M0 92c0-34 28-62 62-62 13 0 25 4 35 11C113 16 141 0 173 0c54 0 98 44 98 98v2c28 5 49 30 49 59H0z"/>
      <path fill="#4ab3d4" opacity=".34" d="M14 95c49 19 103 21 161 5 47-12 84-35 111-69-8-9-18-17-30-22-48 56-104 86-168 91-34 3-59 1-74-5z"/>
    </symbol>
    <symbol id="na-comet" viewBox="0 0 320 140">
      <path fill="#fff8ea" stroke="#4ab3d4" stroke-width="8" d="M0 72C91-8 196-22 315 29l-82 48 87 45C203 152 96 136 0 72z"/>
      <path fill="#4ab3d4" opacity=".36" d="M31 73c78 17 151 3 219-41l-17 45 87 45C209 150 113 134 31 73z"/>
    </symbol>
  </defs>

  <rect width="1200" height="420" fill="#ffffff"/>
  <use href="#na-orbit-planet" x="170" y="190" width="280" height="220"/>
  <use href="#na-cloud" x="380" y="160" width="320" height="160"/>
  <use href="#na-comet" x="750" y="165" width="320" height="140"/>
  <use href="#na-star" x="1060" y="102" width="100" height="100" fill="#fff8ea" stroke="#4ab3d4" stroke-width="5"/>
  <use href="#na-star" x="1020" y="250" width="70" height="70" fill="#4ab3d4" opacity=".65"/>
</svg>
